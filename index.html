<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משחק דיג - 3 שלבים</title>
    <meta name="description" content="משחק דיג חינוכי בשלושה שלבים - אספו אוצרות וגלו עקרונות הוק">
    <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="12" fill="%23075372"/><path d="M14 18h36l-6 18H20z" fill="%23a5652c"/><path d="M22 36c4 12 16 12 20 0" fill="none" stroke="%23f7c948" stroke-width="5" stroke-linecap="round"/><path d="M32 13v32" stroke="%23fff2c7" stroke-width="4" stroke-linecap="round"/></svg>'>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>

    <button id="mute-btn" type="button" title="השתק סאונד" aria-label="השתק סאונד" aria-pressed="false">
        <svg class="sound-icon sound-icon-on" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 9v6h4l5 4V5L7 9H3z"></path>
            <path d="M16 8.5a5 5 0 0 1 0 7"></path>
            <path d="M18.5 6a8 8 0 0 1 0 12"></path>
        </svg>
        <svg class="sound-icon sound-icon-off" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 9v6h4l5 4V5L7 9H3z"></path>
            <path d="M17 9l5 5"></path>
            <path d="M22 9l-5 5"></path>
        </svg>
    </button>

    <!-- Top HUD (visible during gameplay) -->
    <div id="game-ui" class="hidden">
        <div class="hud-inner">
            <div id="level-display" class="hud-box">שלב 1</div>
            <div id="message-display" class="hud-box hud-message">הטל את החכה כדי לאסוף תיבה</div>
            <div id="score-display" class="hud-box hud-score">נקודות: 0</div>
        </div>
    </div>

    <div id="ui-layer">
        <!-- Start Screen -->
        <div id="start-screen" class="ui-box screen-center ui-overlay">
            <h1 class="title-lg">HookTheHook</h1>
            <p class="text-body">בואו נצלול פנימה! עברו את שלושת השלבים ואספו אוצרות ממעמקי הים.</p>
            <button id="start-btn" class="btn btn-blue">התחל לשחק</button>
        </div>

        <!-- Level Intro Screen -->
        <div id="level-intro-screen" class="ui-box screen-center hidden ui-overlay">
            <h2 id="level-intro-title" class="title-lg"></h2>
            <p id="level-intro-text" class="text-body"></p>
            <button id="start-level-btn" class="btn btn-blue btn-sm">המשך</button>
        </div>

        <!-- Survey 1 (Post Level 1) -->
        <div id="survey-1-screen" class="ui-box screen-center hidden ui-overlay">
            <h2 class="title-lg">שלב 1 הושלם!</h2>
            <p class="text-body">איך התחושה להתחיל ללמוד את הקורס הזה בעזרת משחק?</p>
            <div id="emoji-container-1" class="emoji-row">
                <span class="emoji-btn face-choice face-excited" data-emoji="excited" aria-label="מתרגש"></span>
                <span class="emoji-btn face-choice face-happy" data-emoji="happy" aria-label="שמח"></span>
                <span class="emoji-btn face-choice face-thinking" data-emoji="thinking" aria-label="חושב"></span>
                <span class="emoji-btn face-choice face-unsure" data-emoji="unsure" aria-label="לא בטוח"></span>
                <span class="emoji-btn face-choice face-sleepy" data-emoji="sleepy" aria-label="ישנוני"></span>
            </div>
            <div class="selected-display">בחרת: <span id="selected-emojis-display" style="font-weight:700"></span></div>
            <button id="submit-survey-1-btn" class="btn btn-blue btn-sm">המשך</button>
        </div>

        <!-- Animation Modal (Level 2) -->
        <div id="animation-modal" class="hidden ui-overlay">
            <div class="modal-inner perspective-container">
                <!-- The Card -->
                <div id="principle-card" class="principle-card">
                    <h2 id="card-title" class="card-title"></h2>
                    <p id="card-text" class="card-text"></p>
                    <button id="close-card-btn" class="btn btn-amber" style="align-self:center">המשך</button>
                </div>

                <!-- The Chest -->
                <div class="chest-wrapper">
                    <div id="chest-lid" class="chest-lid"></div>
                    <div class="chest-base">
                        <div class="chest-lock"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Survey 2 (Final) -->
        <div id="survey-2-screen" class="ui-box screen-center hidden ui-overlay">
            <h2 class="title-green">כל הכבוד, סיימת!</h2>

            <div class="survey-section">
                <p class="text-bold">1. כמה נהנית לקבל נקודות?</p>
                <div id="rating-1" class="emoji-row-reverse">
                    <span class="emoji-btn single-emoji face-choice face-excited" data-val="1" aria-label="מאוד נהניתי"></span>
                    <span class="emoji-btn single-emoji face-choice face-happy" data-val="2" aria-label="נהניתי"></span>
                    <span class="emoji-btn single-emoji face-choice face-neutral" data-val="3" aria-label="נייטרלי"></span>
                    <span class="emoji-btn single-emoji face-choice face-unsure" data-val="4" aria-label="פחות נהניתי"></span>
                    <span class="emoji-btn single-emoji face-choice face-angry" data-val="5" aria-label="לא נהניתי"></span>
                </div>
            </div>

            <div class="survey-section">
                <p class="text-bold">2. כמה נהנית מהאינטראקציה והאתגר?</p>
                <div id="rating-2" class="emoji-row-reverse">
                    <span class="emoji-btn single-emoji face-choice face-excited" data-val="1" aria-label="מאוד נהניתי"></span>
                    <span class="emoji-btn single-emoji face-choice face-happy" data-val="2" aria-label="נהניתי"></span>
                    <span class="emoji-btn single-emoji face-choice face-neutral" data-val="3" aria-label="נייטרלי"></span>
                    <span class="emoji-btn single-emoji face-choice face-unsure" data-val="4" aria-label="פחות נהניתי"></span>
                    <span class="emoji-btn single-emoji face-choice face-angry" data-val="5" aria-label="לא נהניתי"></span>
                </div>
            </div>

            <button id="submit-survey-2-btn" class="btn btn-green">סיום</button>
        </div>
    </div>
</div>

<script type="module" src="js/main.js"></script>

</body>
</html>
